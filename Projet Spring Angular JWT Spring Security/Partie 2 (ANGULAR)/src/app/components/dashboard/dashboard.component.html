<div class="p-6 bg-gray-50 min-h-screen">
  <h1 class="text-3xl font-bold text-gray-800 mb-6">Tableau de Bord</h1>

  <!-- Cartes de Stats Rapides -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
      <p class="text-gray-500 text-sm">Clients Totaux</p>
      <p class="text-3xl font-bold text-gray-800">1,245</p>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
      <p class="text-gray-500 text-sm">Encours Total</p>
      <p class="text-3xl font-bold text-gray-800">€ 4,582,100</p>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
      <p class="text-gray-500 text-sm">Opérations Jour</p>
      <p class="text-3xl font-bold text-gray-800">342</p>
    </div>
  </div>

  <!-- Graphiques -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Doughnut Chart -->
    <div class="bg-white p-6 rounded-xl shadow-sm">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Répartition des Comptes</h2>
      <div class="h-64 flex justify-center items-center">
        <canvas baseChart
          [data]="doughnutChartData"
          [options]="doughnutChartOptions"
          [type]="'doughnut'">
        </canvas>
      </div>
    </div>

    <!-- Line Chart -->
    <div class="bg-white p-6 rounded-xl shadow-sm">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Évolution des Soldes (6 mois)</h2>
      <div class="h-64">
        <canvas baseChart
          [data]="lineChartData"
          [options]="lineChartOptions"
          [type]="'line'">
        </canvas>
      </div>
    </div>
  </div>
</div>
